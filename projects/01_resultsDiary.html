<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Алексей | Портфолио</title>
    <!-- Шрифты -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <!-- Font Awesome для иконок (опционально) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="./../css/style.css">
</head>
<body>
    <!-- Шапка -->
    <header class="header">
        <div class="container header__container">
            <div class="header__logo">Alexey</div>
            <nav class="header__nav">
                <ul class="nav__list">
                    <li><a href="./index.html" class="nav__link">Главная</a></li>
                    <li><a href="#contact" class="nav__link">Контакты</a></li>
                </ul>
            </nav>
            <button class="header__burger" aria-label="Меню">
                <span></span><span></span><span></span>
            </button>
        </div>
    </header>

    <main>
        <!-- Проекты -->
        <section id="projects" class="projects">
            <div class="container">
                <h2 class="section-title">Проекты</h2>
                <div class="projects__grid">
                    <!-- Карточка проекта 1 (пример) -->
                    <div class="project-card">
                        <div class="project-card__image">
                            <img src="https://via.placeholder.com/300x200" alt="Скриншот проекта">
                        </div>
                        <h3 class="project-card__title">Словарь японского</h3>
                        <p class="project-card__desc">Веб-приложение для изучения хираганы с карточками и поиском.</p>
                        <div class="project-card__tags">
                            <span>HTML</span><span>CSS</span><span>JS</span>
                        </div>
                        <a href="#" class="btn btn--small">Посмотреть</a>
                    </div>
                    <!-- Ещё карточки -->
                    <div class="project-card">
                        <div class="project-card__image">
                            <img src="https://via.placeholder.com/300x200" alt="Скриншот проекта">
                        </div>
                        <h3 class="project-card__title">Табы на JS</h3>
                        <p class="project-card__desc">Компонент переключения вкладок (см. демо ниже).</p>
                        <div class="project-card__tags">
                            <span>JS</span><span>CSS</span>
                        </div>
                        <a href="#" class="btn btn--small">Посмотреть</a>
                    </div>
                </div>
            </div>
        </section>
        <!-- Контакты -->
        <section id="contact" class="contact">
            <div class="container">
                <h2 class="section-title">Контакты</h2>
                <div class="contact__links">
                    <a href="mailto:alexey@example.com" class="contact__link">
                        <i class="fas fa-envelope"></i> Email
                    </a>
                    <a href="https://github.com/tvoy-github" target="_blank" class="contact__link">
                        <i class="fab fa-github"></i> GitHub
                    </a>
                    <a href="#" target="_blank" class="contact__link">
                        <i class="fab fa-telegram"></i> Telegram
                    </a>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <p>© 2026 Алексей</p>
        </div>
    </footer>

    <script src="./../js/script.js"></script>

</html>
